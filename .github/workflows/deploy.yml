# ═══════════════════════════════════════════════════════════════════
# TaskFlow — CI/CD Pipeline
# ═══════════════════════════════════════════════════════════════════
# Triggers on push to main branch.
# Runs backend tests, then deploys to EC2 via SSH.
#
# Required GitHub Secrets:
#   EC2_HOST      — Elastic IP of the EC2 instance
#   EC2_SSH_KEY   — Private SSH key for ubuntu user
#   EC2_USER      — SSH username (default: ubuntu)
# ═══════════════════════════════════════════════════════════════════

name: Deploy to AWS EC2

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

jobs:
  # ── Test ──────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: taskflow_test
          POSTGRES_USER: taskflow_user
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U taskflow_user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pip-audit

      - name: Security audit (pip-audit)
        run: |
          cd backend
          pip-audit --strict || true

      - name: Run backend tests
        env:
          DATABASE_URL: postgres://taskflow_user:testpassword@localhost:5432/taskflow_test
          SECRET_KEY: ci-test-secret-key-not-for-production
          DJANGO_SETTINGS_MODULE: app.settings.development
        run: |
          cd backend
          python manage.py test app.tasks --verbosity=2

  # ── Lint ──────────────────────────────────────────────────────
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linters
        run: pip install flake8

      - name: Lint backend
        run: |
          cd backend
          flake8 . --max-line-length=120 --exclude=migrations,__pycache__

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Frontend security audit (npm audit)
        run: |
          cd frontend
          npm ci
          npm audit --audit-level=moderate || true

      - name: Install Checkov
        run: pip install checkov

      - name: IaC security scan (Checkov)
        run: checkov -d terraform/ --config-file .checkov.yml || true

      - name: Check for hardcoded secrets
        run: |
          ! grep -r "AWS_SECRET_ACCESS_KEY\s*=\s*['\"][A-Za-z0-9]" \
            --include="*.py" --include="*.js" --include="*.tf" . \
            --exclude-dir=".terraform" --exclude-dir="node_modules" 2>/dev/null
          echo "✓ No hardcoded secrets found"

  # ── Deploy ────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    needs: [test, lint]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER || 'ubuntu' }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/taskflow
            git pull origin main

            # Build and restart services
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

            # Run migrations
            docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T backend \
              python manage.py migrate --noinput

            # Collect static files
            docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T backend \
              python manage.py collectstatic --noinput

            echo "✓ Deployment complete at $(date)"
