version: "3.9"

services:
  db:
    restart: always

  backend:
    build:
      context: ./backend
      target: production
    volumes: []
    environment:
      DJANGO_SETTINGS_MODULE: app.settings.production
    restart: always

  frontend:
    build:
      context: ./frontend
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    volumes: []
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/ssl/taskflow:/etc/ssl/taskflow:ro
      - certbot_www:/var/www/certbot:ro
    restart: always
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-check-certificate -qO- https://localhost:443/api/health/ || wget -qO- http://localhost:80/ || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  postgres_data:
  media_files:
  certbot_www:

networks:
  internal:
    driver: bridge
